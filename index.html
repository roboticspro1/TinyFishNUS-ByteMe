<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Web2API | Developer Portal</title>
    <style>
        body { font-family: 'Courier New', monospace; background-color: #0d1117; color: #c9d1d9; padding: 2rem; line-height: 1.5; }
        .container { max-width: 1100px; margin: auto; }
        .header-section { border-bottom: 1px solid #30363d; padding-bottom: 20px; margin-bottom: 30px; }
        h1 { color: #58a6ff; margin: 0; }
        .key-banner { background: #161b22; padding: 15px; border-radius: 6px; border: 1px dashed #58a6ff; margin: 20px 0; display: flex; justify-content: space-between; align-items: center; }
        input { width: 100%; padding: 12px; margin: 10px 0 20px 0; background: #010409; color: #79c0ff; border: 1px solid #30363d; border-radius: 5px; box-sizing: border-box; font-family: monospace; }
        button { background-color: #238636; color: white; padding: 12px 24px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; font-family: monospace; }
        button:hover { background-color: #2ea043; }
        button:disabled { background-color: #21262d; color: #8b949e; cursor: not-allowed; }
        .secondary-btn { background-color: #21262d; border: 1px solid #30363d; padding: 8px 16px; font-size: 13px; color: #c9d1d9; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        pre { background: #000; padding: 20px; border-radius: 6px; overflow-x: auto; border: 1px solid #30363d; height: 450px; font-size: 13px; }
        .json-color { color: #7ee787; }
        .sdk-color { color: #79c0ff; }
        .label-text { font-weight: bold; color: #8b949e; font-size: 12px; letter-spacing: 1px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-section">
            <h1>🌐 Web2API</h1>
            <p>The Autonomous Web-to-JSON Infrastructure Engine</p>
        </div>

        <div class="key-banner">
            <div>
                <span class="label-text">DEVELOPER STATUS:</span> 
                <span id="keyDisplay" style="color: #ffa657; margin-left: 10px; font-weight: bold;">NO ACTIVE KEY</span>
            </div>
            <button class="secondary-btn" onclick="generateKey()">+ GENERATE API KEY</button>
        </div>

        <div style="background: #161b22; padding: 25px; border-radius: 8px; border: 1px solid #30363d;">
            <label class="label-text">TARGET URL:</label>
            <input type="text" id="url" value="https://news.ycombinator.com">

            <label class="label-text">EXTRACTION GOAL (PLAIN ENGLISH):</label>
            <input type="text" id="goal" value="Extract the top 5 articles. Return a JSON array with 'title' and 'points'.">

            <button id="extractBtn" onclick="runExtraction()" style="width: 100%;">🚀 DEPLOY AGENT & GENERATE SDK</button>
        </div>

        <div class="grid">
            <div>
                <p class="label-text">LIVE DATA STREAM (JSON)</p>
                <pre id="output" class="json-color">// Awaiting deployment...</pre>
            </div>
            <div>
                <p class="label-text">AUTO-GENERATED PYTHON SDK (WITH AUTH)</p>
                <pre id="sdkOutput" class="sdk-color"># SDK will be synthesized upon extraction...</pre>
            </div>
        </div>
    </div>

    <script>
        let currentApiKey = null;

        function generateKey() {
            currentApiKey = "w2a_live_" + Math.random().toString(36).substring(2, 10);
            document.getElementById('keyDisplay').innerText = currentApiKey.toUpperCase();
            alert("New API Key generated. Your SDK code will now be personalized with this credential.");
        }

        async function runExtraction() {
            const url = document.getElementById('url').value;
            const goal = document.getElementById('goal').value;
            const output = document.getElementById('output');
            const sdkOutput = document.getElementById('sdkOutput');
            const btn = document.getElementById('extractBtn');

            if (!currentApiKey) {
                alert("Please generate an API Key first to authenticate your session.");
                return;
            }

            output.innerText = "// Deploying TinyFish Agent...\n// Bypassing bot detection...\n// Parsing DOM semantics...";
            sdkOutput.innerText = "# Synthesizing SDK with OpenAI Codex...";
            btn.disabled = true;
            btn.innerText = "PROCESSING...";

            try {
                const response = await fetch('/extract', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'X-API-KEY': currentApiKey
                    },
                    body: JSON.stringify({ url: url, extraction_goal: goal })
                });

                const result = await response.json();
                
                if (result.status === "success") {
                    // Display Code
                    let code = result.auto_generated_sdk.replace(/```python/g, '').replace(/```/g, '').trim();
                    sdkOutput.innerText = code;
                    
                    // Display Data
                    const displayData = {...result};
                    delete displayData.auto_generated_sdk;
                    output.innerText = JSON.stringify(displayData, null, 2);
                } else {
                    output.innerText = "Error: " + result.message;
                }
            } catch (err) {
                output.innerText = "Fatal Error: " + err.message;
            }

            btn.disabled = false;
            btn.innerText = "🚀 DEPLOY AGENT & GENERATE SDK";
        }
    </script>
</body>
</html>
